<svg width="1544" height="500" viewBox="0 0 1544 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Block Editor Studio — a calmer, cleaner block editor">
  <title>Block Editor Studio</title>
  <desc>Logo lockup: the stacked-blocks mark at left, then the wordmark and tagline, on a calm off-white background.</desc>

  <rect width="1544" height="500" fill="#f5f7f9"/>

  <!-- Mark: stacked editor blocks (echoes the icon), left of the wordmark — no overlap -->
  <rect x="120" y="170" width="150" height="44" rx="13" fill="#2d6e7e"/>
  <rect x="120" y="232" width="196" height="44" rx="13" fill="#d3dae3"/>
  <rect x="120" y="294" width="136" height="44" rx="13" fill="#d3dae3"/>

  <!-- Wordmark + tagline, left-aligned with open space to the right -->
  <text x="392" y="252" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="88" font-weight="700" letter-spacing="-2" fill="#1d2433">Block Editor Studio</text>
  <text x="396" y="318" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="36" font-weight="400" fill="#57607a">A calmer, cleaner block editor.</text>
</svg>
