<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Writing Tools for the Block Editor">
  <title>Writing Tools for the Block Editor</title>
  <desc>A clean rounded tile showing a tidy stack of editor content blocks, the top block in the plugin's accent colour.</desc>
  <rect width="256" height="256" rx="58" fill="#f5f7f9"/>
  <rect x="1" y="1" width="254" height="254" rx="57" fill="none" stroke="#e2e6ec" stroke-width="2"/>
  <!-- A calm stack of content blocks: the editor, tidied. Accent = the active/heading block. -->
  <rect x="56" y="74" width="112" height="34" rx="10" fill="#2d6e7e"/>
  <rect x="56" y="120" width="144" height="34" rx="10" fill="#d3dae3"/>
  <rect x="56" y="166" width="100" height="34" rx="10" fill="#d3dae3"/>
</svg>
