name: Debug SVN creds (temporary)

# Temporary, manually-triggered diagnostic. Prints ONLY derived facts about
# the secrets (length, whitespace, whether the username equals the expected
# committer) — never the secret values themselves. Remove after debugging.

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect SVN_USERNAME / SVN_PASSWORD (no values printed)
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
        run: |
          U="$SVN_USERNAME"
          echo "username length: ${#U}"
          if [ "$U" = "njones35" ]; then echo "username == 'njones35': YES"; else echo "username == 'njones35': NO"; fi
          TRIMMED="$(printf '%s' "$U" | tr -d '[:space:]')"
          if [ "$U" = "$TRIMMED" ]; then echo "has surrounding/inner whitespace: NO"; else echo "has surrounding/inner whitespace: YES"; fi
          if [ "$TRIMMED" = "njones35" ]; then echo "trimmed == 'njones35': YES"; else echo "trimmed == 'njones35': NO"; fi
          echo "password length: ${#SVN_PASSWORD}"
          if [ -n "$SVN_PASSWORD" ]; then echo "password non-empty: YES"; else echo "password non-empty: NO"; fi
