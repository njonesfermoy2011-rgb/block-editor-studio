name: PHP Code Sniffer
on: [push, pull_request]
jobs:
  phpcs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: phpcs
      - run: phpcs --standard=WordPress --extensions=php --ignore=bin,vendor,node_modules . || true
