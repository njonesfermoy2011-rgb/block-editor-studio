on:
  # Trigger the workflow on push or pull request,
  # but only for the main branch
  push:
    branches:
      - master
  pull_request:
    types: [ opened, labeled, synchronize ]

name: Mago Code Analysis and Linting
jobs:
  mago:
    name: Mago
    if: >-
      ${{ contains(github.event.pull_request.labels.*.name, 'run fast analysis')
          || contains(github.event.pull_request.labels.*.name, 'run analysis') }}

    runs-on: ubuntu-latest

    steps:
      - name: "📥 Fetching Repository Contents"
        uses: actions/checkout@v4.1.1

      - name: "🔧 Setup PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Install dependencies
        run: composer install --dev --prefer-dist --no-progress

      - name: "✅ Mago Lint"
        run: vendor/bin/mago lint

      - name: "🔎 Mago Analyze"
        run: vendor/bin/mago analyze
