name: Update WordPress.org assets and readme

# Syncs listing assets (icon, banner, screenshots) and the readme to the
# live plugin page WITHOUT cutting a new release. Runs when .wordpress-org/
# or readme.txt changes on main. Useful for adding the banner/screenshots
# or tweaking the description after launch.

on:
  push:
    branches:
      - main
    paths:
      - ".wordpress-org/**"
      - "readme.txt"

jobs:
  assets:
    name: Update assets & readme
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update assets & readme
        uses: 10up/action-wordpress-plugin-asset-update@stable
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: block-editor-studio
